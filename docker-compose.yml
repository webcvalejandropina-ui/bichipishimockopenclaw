# UI + API. Acceso recomendado: http://bichipishi.local:${BICHI_WEB_PORT:-8080}
# Añade en el sistema: 127.0.0.1 bichipishi.local  (ver README)
# La API solo va por la red Docker + Nginx (/api); el puerto 3001 no se publica en el host.

name: bichipishi

services:
  metrics:
    build: ./metrics-api
    container_name: bichipishi-metrics
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - BICHI_APP_NAME=${PUBLIC_BICHI_APP_NAME:-Bichipishi}
      - CRON_EXTRA_FILE=/app/cron.extra
      # Datos del PC real cuando la API corre en Docker (rellena en .env):
      - BICHI_HOST_HOSTNAME=${BICHI_HOST_HOSTNAME:-}
      - BICHI_HOST_DEVICE_NAME=${BICHI_HOST_DEVICE_NAME:-}
      - BICHI_HOST_OS=${BICHI_HOST_OS:-}
      - BICHI_MEM_TOTAL_GIB=${BICHI_MEM_TOTAL_GIB:-}
      - BICHI_MEM_USED_GIB=${BICHI_MEM_USED_GIB:-}
      - BICHI_HOST_UPTIME_SEC=${BICHI_HOST_UPTIME_SEC:-}
      - BICHI_HOST_CPU_MODEL=${BICHI_HOST_CPU_MODEL:-}
      - BICHI_HOST_CPU_CORES=${BICHI_HOST_CPU_CORES:-}
      - OPENCLAW_LOG_PATH=${OPENCLAW_LOG_PATH:-}
      - OPENCLAW_FORCE=${OPENCLAW_FORCE:-}
    volumes:
      - ./config/cron.extra:/app/cron.extra:ro
      - bichi-api-data:/app/data
      # Motor Docker del anfitrión (contenedores reales en la UI)
      - /var/run/docker.sock:/var/run/docker.sock
      # Linux anfitrión: descomenta para identificar hostname y SO sin duplicarlos en .env
      # (en Docker Desktop macOS/Windows suele ser el SO de la VM, no el del Mac/PC)
      # - /etc/os-release:/host/etc/os-release:ro
      # - /etc/hostname:/host/etc/hostname:ro
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        PUBLIC_BICHI_APP_NAME: ${PUBLIC_BICHI_APP_NAME:-Bichipishi}
        PUBLIC_BICHI_AVATAR_URL: ${PUBLIC_BICHI_AVATAR_URL:-}
    container_name: bichipishi-web
    ports:
      - "${BICHI_WEB_PORT:-8080}:80"
    environment:
      - PUBLIC_BICHI_APP_NAME=${PUBLIC_BICHI_APP_NAME:-}
      - PUBLIC_BICHI_AVATAR_URL=${PUBLIC_BICHI_AVATAR_URL:-}
    depends_on:
      - metrics
    restart: unless-stopped

volumes:
  bichi-api-data:
