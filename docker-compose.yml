# UI en Docker + API en el host (3001). Nginx hace proxy /api → host.docker.internal:3001
#
# Arranque (Windows/Mac/Linux): pnpm run bichi:up  — no basta solo "docker compose up"
# Dominios: config/site.env → BICHI_SITE_HOST (defecto nip.io + bichipishi.home)
#
# Todo en Docker: docker-compose.full-docker.yml

name: bichipishi

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        PUBLIC_BICHI_APP_NAME: ${PUBLIC_BICHI_APP_NAME:-Bichipishi}
        PUBLIC_BICHI_AVATAR_URL: ${PUBLIC_BICHI_AVATAR_URL:-}
    container_name: bichipishi-web
    ports:
      - "${BICHI_WEB_PORT:-80}:80"
    env_file:
      - config/site.env
    environment:
      - PUBLIC_BICHI_APP_NAME=${PUBLIC_BICHI_APP_NAME:-}
      - PUBLIC_BICHI_AVATAR_URL=${PUBLIC_BICHI_AVATAR_URL:-}
      - BICHI_NGINX_PROFILE=host-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
